name: Publish to Chrome Web Store

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest and package versions match
        run: |
          MANIFEST=$(node -p "require('./public/manifest.json').version")
          PACKAGE=$(node -p "require('./package.json').version")
          if [ "$MANIFEST" != "$PACKAGE" ]; then
            echo "::error::manifest.json ($MANIFEST) != package.json ($PACKAGE)"
            exit 1
          fi
          echo "Version: $MANIFEST"

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(node -p "require('./public/manifest.json').version")
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag v$TAG does not match manifest version $MANIFEST"
            exit 1
          fi
          echo "Tag v$TAG matches manifest $MANIFEST"

      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: yarn

      - run: yarn install --frozen-lockfile
      - run: yarn verify
      - run: yarn build

      - name: Zip dist contents
        run: cd dist && zip -r ../extension.zip .

      - name: Upload to Chrome Web Store
        uses: mobilefirstllc/cws-publish@latest
        with:
          action: upload
          client_id: ${{ secrets.CHROME_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          extension_id: ${{ secrets.CHROME_EXTENSION_ID }}
          zip_file: extension.zip
